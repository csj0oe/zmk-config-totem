name: Draw keymap

on:
  workflow_dispatch:
  push:
    paths:
      - "config/boards/shields/totem/totem.keymap"
      - "keymap-drawer/config.yaml"
      - "keymap-drawer/totem-superposed.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      # ── Layered diagram (parsed from keymap file) ─────────────────────────
      - name: Parse keymap
        run: |
          keymap -c keymap-drawer/config.yaml parse \
            -z config/boards/shields/totem/totem.keymap \
            -c 10 \
            > keymap-drawer/totem.yaml

      - name: Draw layered diagram
        run: |
          keymap -c keymap-drawer/config.yaml draw \
            keymap-drawer/totem.yaml \
            -o keymap-drawer/totem.svg

      # ── Superposed diagram (all layers on one keyboard) ───────────────────
      - name: Draw superposed diagram
        run: |
          keymap -c keymap-drawer/config.yaml draw \
            keymap-drawer/totem-superposed.yaml \
            -o keymap-drawer/totem-superposed.svg

      # ── Commit results ────────────────────────────────────────────────────
      - name: Commit diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Draw] ${{ github.event.head_commit.message }}"
          file_pattern: "keymap-drawer/*.svg keymap-drawer/totem.yaml"
